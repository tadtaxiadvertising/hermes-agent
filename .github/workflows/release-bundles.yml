name: Release Bundle Build

on:
  # Stable: tag push (v1.2.3)
  push:
    tags:
      - "v*"
  # Nightly: daily cron
  schedule:
    - cron: "0 2 * * *"  # 2:00 UTC daily
  # Manual trigger (for testing)
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel (nightly or stable)"
        required: false
        default: "nightly"

permissions:
  contents: write  # needed for creating releases

# Concurrency: only one release build per ref at a time.
concurrency:
  group: release-bundles-${{ github.ref }}
  cancel-in-progress: false

env:
  MIN_UPDATER_VERSION: "0.1.0"

jobs:
  build:
    name: Build bundle (${{ matrix.platform }})
    if: >-
      github.repository == 'NousResearch/hermes-agent' ||
      github.repository == 'ethernet8023/hermes-agent'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            os: linux
            arch: x64
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
          - platform: darwin-arm64
            runner: macos-14
            os: darwin
            arch: arm64
          - platform: win-x64
            runner: windows-2022
            os: win
            arch: x64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"  # for running write-manifest.py; the bundle uses its own 3.11

      - name: Configure release signing
        shell: bash
        env:
          HERMES_SIGNING_KEY: ${{ secrets.HERMES_SIGNING_KEY }}
        run: |
          test -n "$HERMES_SIGNING_KEY" || {
            echo "::error::HERMES_SIGNING_KEY is required for release bundles"
            exit 1
          }
          python -m pip install --disable-pip-version-check pynacl==1.5.0
          PUBLIC_KEY=$(HERMES_SIGNING_KEY="$HERMES_SIGNING_KEY" python - <<'PY'
          import base64
          import os
          import nacl.signing

          key = nacl.signing.SigningKey(base64.b64decode(os.environ["HERMES_SIGNING_KEY"]))
          print(base64.b64encode(bytes(key.verify_key)).decode())
          PY
          )
          echo "HERMES_RELEASE_PUBLIC_KEY=$PUBLIC_KEY" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install uv
        shell: bash
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            CHANNEL="stable"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            VERSION="$(date -u +%Y.%m.%d)"
            CHANNEL="nightly"
          else
            VERSION="$(date -u +%Y.%m.%d).$(echo "${{ github.run_number }}" | tail -c3)"
            CHANNEL="${{ github.event.inputs.channel || 'nightly' }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Channel: $CHANNEL"

      - name: Build bundle
        shell: bash
        run: |
          bash scripts/release/build-bundle.sh \
            --out dist/bundle

      - name: Stage updater bootstrap asset
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "win" ]]; then
            asset="dist/hermes-updater-${{ matrix.platform }}.exe"
            cp dist/bundle/bin/hermes.exe "$asset"
          else
            asset="dist/hermes-updater-${{ matrix.platform }}"
            cp dist/bundle/bin/hermes "$asset"
          fi
          python - "$asset" <<'PY'
          import hashlib
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          digest = hashlib.sha256(path.read_bytes()).hexdigest()
          path.with_name(path.name + ".sha256").write_text(f"{digest}  {path.name}\n")
          PY

      - name: Write and sign manifest
        shell: bash
        env:
          HERMES_SIGNING_KEY: ${{ secrets.HERMES_SIGNING_KEY }}
        run: |
          python scripts/release/write-manifest.py \
            --bundle-dir dist/bundle \
            --signing-key "$HERMES_SIGNING_KEY" \
            --version "${{ steps.version.outputs.version }}" \
            --channel "${{ steps.version.outputs.channel }}" \
            --git-sha "${{ github.sha }}" \
            --platform "${{ matrix.platform }}"

      - name: Smoke test — bundle boots
        shell: bash
        run: |
          set -e
          if [[ "${{ matrix.os }}" == "win" ]]; then
            dist/bundle/bin/hermes.exe --global --version
            dist/bundle/runtime/venv/Scripts/python.exe -c "import hermes_cli, run_agent, model_tools; print('SMOKE_TEST_OK')"
          else
            dist/bundle/bin/hermes --global --version
            dist/bundle/runtime/venv/bin/python -c "import hermes_cli, run_agent, model_tools; print('SMOKE_TEST_OK')"
          fi

      - name: Smoke test — manifest verifies
        shell: bash
        run: |
          python scripts/release/write-manifest.py \
            --verify \
            --bundle-dir dist/bundle \
            --pubkey "$HERMES_RELEASE_PUBLIC_KEY"

      - name: Create bundle archive
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "win" ]]; then
            7z a -tzip "dist/hermes-${{ steps.version.outputs.version }}-${{ matrix.platform }}.zip" dist/bundle/
            echo "artifact=dist/hermes-${{ steps.version.outputs.version }}-${{ matrix.platform }}.zip" >> $GITHUB_OUTPUT
          else
            tar --zstd -cf "dist/hermes-${{ steps.version.outputs.version }}-${{ matrix.platform }}.tar.zst" -C dist bundle/
            echo "artifact=dist/hermes-${{ steps.version.outputs.version }}-${{ matrix.platform }}.tar.zst" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hermes-${{ steps.version.outputs.version }}-${{ matrix.platform }}
          path: |
            dist/hermes-${{ steps.version.outputs.version }}-${{ matrix.platform }}.*
            dist/hermes-updater-${{ matrix.platform }}*
          retention-days: 30


  lifecycle-e2e:
    name: Managed lifecycle E2E
    if: >-
      github.repository == 'NousResearch/hermes-agent' ||
      github.repository == 'ethernet8023/hermes-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install uv and fixture dependencies
        shell: bash
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          python -m pip install --disable-pip-version-check pynacl==1.5.0
      - name: Slot lifecycle
        run: bash scripts/e2e/test-slot-lifecycle.sh
      - name: Historical adoption funnel
        run: bash scripts/e2e/test-adoption.sh
      - name: Ejected worktree lifecycle
        run: bash scripts/e2e/test-ejected-worktrees.sh

  desktop-e2e:
    name: Packaged desktop update E2E
    if: >-
      github.repository == 'NousResearch/hermes-agent' ||
      github.repository == 'ethernet8023/hermes-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install native and JS dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libgtk-3-0 libnss3 libxss1 libxtst6 libatspi2.0-0 libdrm2 libgbm1 libasound2t64
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          npm ci
      - name: Packaged signed-update relaunch gate
        run: bash scripts/e2e/test-desktop-update.sh

  publish:
    name: Publish release bundles
    needs: [build, lifecycle-e2e, desktop-e2e]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          merge-multiple: true
      - name: Publish stable tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --generate-notes dist/*
      - name: Publish rolling nightly
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view hermes-nightly --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create hermes-nightly --repo "${{ github.repository }}" --prerelease \
              --title "Hermes Nightly" --notes "Automated nightly build from ${{ github.sha }}."
          gh release upload hermes-nightly --repo "${{ github.repository }}" --clobber dist/*
