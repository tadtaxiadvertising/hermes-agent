# =============================================================================
# config.yaml — Easypanel-optimized Hermes Gateway Configuration
# =============================================================================
# This config is optimized for a low-resource VPS deployment:
# - Browser tool disabled (no Chromium — use cloud browser-use)
# - Terminal backend: local (commands run inside the container)
# - Memory-compressed conversations to stay within context limits
# - No TUI/Dashboard (access via API server or messaging platforms only)
# - Full TAD DOOH project access via GITHUB_PAT env var
# - Memory seeded with TAD project knowledge at deploy time
# =============================================================================

model:
  default: deepseek-ai/deepseek-v4-flash
  provider: nvidia
  base_url: https://integrate.api.nvidia.com/v1

agent:
  max_turns: 60
  verbose: false
  reasoning_effort: medium

terminal:
  backend: local
  cwd: /opt/data
  timeout: 180

# Browser tool: DISABLED (no Chromium on Easypanel image).
# Use cloud browser-use provider instead (requires BROWSERBASE_API_KEY).
browser:
  inactivity_timeout: 120
  cloud_provider: browser-use
  disabled: true

# Web search: use Firecrawl cloud (requires FIRECRAWL_API_KEY)
# or Exa (requires EXA_API_KEY) — both are lazy-installed.
web:
  backend: firecrawl

# Compression: aggressive to keep memory usage low on constrained VPS
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
  protect_first_n: 3

display:
  compact: true
  streaming: true

# Memory: full limits to carry TAD project knowledge
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6

# Fallback providers (free NVIDIA models — ordered by token efficiency)
fallback_providers:
  - provider: nvidia
    model: stepfun-ai/step-3.7-flash
    key_env: NVIDIA_API_KEY
  - provider: nvidia
    model: minimaxai/minimax-m2.7
    key_env: NVIDIA_API_KEY
  - provider: nvidia
    model: deepseek-ai/deepseek-v4-flash
    key_env: NVIDIA_API_KEY
  - provider: nvidia
    model: qwen/qwen3.5-122b
    key_env: NVIDIA_API_KEY
  - provider: nvidia
    model: glm-5.2
    key_env: NVIDIA_API_KEY
  - provider: nvidia
    model: deepseek-ai/deepseek-v4-pro
    key_env: NVIDIA_API_KEY
  - provider: nvidia
    model: nvidia/nemotron-3-ultra-550b
    key_env: NVIDIA_API_KEY

tts:
  provider: openai

stt:
  enabled: false
  provider: local

tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false

session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4

# Platform toolsets — maps messaging platform to agent toolset
platform_toolsets:
  telegram:
    - hermes-telegram

prompt_caching:
  cache_ttl: 5m

_config_version: 34
